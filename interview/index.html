<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Interview Alexandre through AI-lexandre and his published work." />
  <title>AI-lexandre</title>
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Serif+4:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="page interview-page">
    <main class="interview-shell">
      <section class="intro-block" aria-labelledby="page-title">
        <p class="eyebrow">Interactive Interview</p>
        <h1 id="page-title">AI-lexandre</h1>
        <p class="intro-copy">Ask recruiter-style questions. Answers stay grounded in published projects, internships, experience, education, and skills.</p>
        <div id="role-picker" class="preset-row" aria-label="Interview presets"></div>
      </section>

      <section class="chat-shell" aria-label="Interview chat">
        <div id="conversation" class="conversation" aria-live="polite"></div>

        <form id="interview-form" class="composer">
          <label class="composer-field" for="question-input">
            <span class="sr-only">Question</span>
            <textarea
              id="question-input"
              name="question"
              rows="3"
              placeholder="Ask about system design, tradeoffs, failure modes, or project fit."
            ></textarea>
          </label>

          <div class="composer-bar">
            <div class="composer-meta">
              <span id="submit-status" class="submit-status" role="status"></span>
            </div>
            <div class="composer-actions">
              <button id="clear-thread" class="button ghost subtle-button" type="button">Clear</button>
              <button id="submit-button" class="button primary" type="submit">Ask</button>
            </div>
          </div>
        </form>
      </section>

      <section id="dev-panel" class="dev-panel is-hidden" aria-label="Developer controls">
        <div class="dev-card">
          <strong>Developer</strong>
          <div id="dev-status"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="./config.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
